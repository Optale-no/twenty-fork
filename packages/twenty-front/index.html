<!doctype html>
<html lang="en" translate="no" class="light">
  <head>
    <meta charset="UTF-8" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="/optale-favicon.svg"
      data-rh="true"
    />
    <link rel="apple-touch-icon" href="/images/icons/ios/192.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#1a1c1d" />
    <meta
      name="description"
      content="Optale CRM — relationship intelligence for Optale and SubCo teams"
    />
    <meta
      property="og:image"
      content="https://crm.optale.no/optale-social-card.png"
    />
    <meta
      property="og:description"
      content="Optale CRM — relationship intelligence for Optale and SubCo teams"
    />
    <meta property="og:title" content="Optale CRM" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://crm.optale.no/optale-social-card.png"
    />

    <meta
      name="twitter:description"
      content="Optale CRM — relationship intelligence for Optale and SubCo teams"
    />
    <meta name="twitter:title" content="Optale CRM" />
    <!-- Optale Graphite Semantic fonts (Switzer + Inter + IBM Plex Mono).
         Also imported via graphite-tokens.css; preload here for faster paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap"
    />

    <title>Optale CRM</title>
    <!-- BEGIN: Optale CRM Config (forked from Twenty) -->
    <script id="twenty-env-config">
      window._env_ = {
        // This will be overwritten
      };
    </script>
    <!-- END: Optale CRM Config -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module">
      const disableInputAutoZoom = () => {
        const viewportMetadata = document.querySelector('meta[name=viewport]');

        if (viewportMetadata !== null) {
          viewportMetadata.setAttribute(
            'content',
            'width=device-width, initial-scale=1.0, maximum-scale=1.0',
          );
        }
      };

      const isIOS = /iPad|iPhone/.test(navigator.userAgent);
      if (isIOS) {
        disableInputAutoZoom();
      }
    </script>
    <style>
      :root {
        /* THEME_DARK.background.tertiary */
        --theme-dark-background-tertiary: #1d1d1d;
        /* THEME_LIGHT.background.tertiary */
        --theme-light-background-tertiary: #f1f1f1;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: var(--theme-dark-background-tertiary);
        }
      }

      @media (prefers-color-scheme: light) {
        html,
        body {
          background-color: var(--theme-light-background-tertiary);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
